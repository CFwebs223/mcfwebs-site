<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>MCFWebs v2</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate">
<link rel="stylesheet" href="css/style.css">
<style>
#canvas-wrap { position:relative; width:100%; max-width:600px; aspect-ratio:4/3; margin:40px auto; background:#f5f0e8; overflow:hidden; border:1px solid rgba(26,26,26,0.08); }
#hero-canvas { position:absolute; inset:0; }
canvas { position:absolute; inset:0; width:100%!important; height:100%!important; display:block; pointer-events:none; }
.debug { position:absolute; bottom:0; left:0; right:0; z-index:99; background:rgba(0,0,0,0.85); color:#0f0; font:11px/1.4 monospace; padding:4px 8px; pointer-events:none; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
body { background:#f9f7f2; padding:24px; font-family:system-ui; }
h1 { font-size:13px; letter-spacing:0.12em; text-transform:uppercase; color:#1a1a1a; text-align:center; margin-bottom:8px; opacity:0.6; }
</style>
</head>
<body>
<h1>MCFWebs — Hero Test</h1>
<div id="canvas-wrap">
  <div id="hero-canvas"></div>
  <div class="debug" id="debug">waiting...</div>
</div>

<script type="module">
const dbg = document.getElementById('debug');
const log = m => { dbg.textContent = m; console.log('[MCF]', m); };

log('init');

const c = document.getElementById('hero-canvas');
const canvas = document.createElement('canvas');
canvas.style.cssText = 'position:absolute;inset:0;width:100%!important;height:100%!important;display:block;pointer-events:none';
const ctx = canvas.getContext('2d', { alpha: false });
c.appendChild(canvas);

const img = new Image();
img.onload = () => {
  log(`img loaded ${img.naturalWidth}x${img.naturalHeight}`);
  const w = canvas.parentElement.clientWidth;
  const h = canvas.parentElement.clientHeight;
  canvas.width = w * (window.devicePixelRatio||1);
  canvas.height = h * (window.devicePixelRatio||1);
  ctx.setTransform(window.devicePixelRatio||1,0,0,window.devicePixelRatio||1,0,0);
  ctx.clearRect(0,0,w,h);
  const s = Math.max(w/img.naturalWidth, h/img.naturalHeight);
  const ox = (w - img.naturalWidth*s)/2;
  const oy = (h - img.naturalHeight*s)/2;
  ctx.drawImage(img, ox, oy, img.naturalWidth*s, img.naturalHeight*s);
  log(`drawn at ${Math.round(ox)},${Math.round(oy)} ${Math.round(img.naturalWidth*s)}x${Math.round(img.naturalHeight*s)}`);
};
img.onerror = () => { log('IMG ERROR - 404?'); };
log('loading image...');
img.src = 'images/koi-realistic.jpg';
</script>
</body>
</html>
